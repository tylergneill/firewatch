<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>firewatch</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 1.5rem;
      }
      nav a {
        margin-right: 1rem;
      }
      table {
        border-collapse: collapse;
        margin-bottom: 1rem;
      }
      th, td {
        border: 1px solid #ccc;
        padding: 0.25rem 0.5rem;
        text-align: left;
      }
      h1 {
        margin-bottom: 0.5rem;
      }
      h1 a {
        text-decoration: none;
        color: inherit;
      }
      h2, h3 {
        margin-top: 1.25rem;
        margin-bottom: 0.5rem;
      }
      pre {
        background: #f7f7f7;
        padding: 0.75rem;
        overflow-x: auto;
      }
    </style>
  </head>
  <body>
    <h1><a href="/">firewatch</a></h1>
    <p>{{ app_version }}</p>
    <nav>
      <a href="/summary?start_date={{ start_date }}&end_date={{ end_date }}">Summary</a>
      <a href="/raw?start_date={{ start_date }}&end_date={{ end_date }}">Tail logs</a>
    </nav>
    <form method="get" action="{{ url_for(request.endpoint) }}">
      <input type="hidden" name="view" value="{{ request.endpoint }}">
      <label for="start_date">Start date:</label>
      <input type="date" id="start_date" name="start_date" value="{{ start_date }}">
      <label for="end_date">End date:</label>
      <input type="date" id="end_date" name="end_date" value="{{ end_date }}">
      <button type="submit">Go</button>
    </form>
    <hr>
    <form method="post" action="{{ url_for('select_apps') }}">
    <div class="form-group">
        <label>Filter by Apps:</label>
        {% for app_name in app_names %}
        <div class="form-check form-check-inline">
            <input class="form-check-input" type="checkbox" name="apps" value="{{ app_name }}" id="app_{{ app_name }}" {% if app_name in selected_apps %}checked{% endif %}>
            <label class="form-check-label" for="app_{{ app_name }}">{{ app_name }}</label>
        </div>
        {% endfor %}
    </div>
    <button type="submit" class="btn btn-primary btn-sm">Apply</button>
</form>
    {% block content %}{% endblock %}
    {% block scripts %}{% endblock %}
  </body>
</html>
